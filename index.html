<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preeti Ambwani</title>

<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@300;400;500;700;800&family=Newsreader:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">

<style>

*,*::before,*::after{
box-sizing:border-box;
margin:0;
padding:0;
}

:root{

--bg:#0f172a;
--bg2:#111827;
--bg3:#1f2937;

--text:#f8fafc;
--dim:rgba(248,250,252,0.75);
--dim2:rgba(248,250,252,0.45);

--accent:#22c55e;
--accent-d:rgba(34,197,94,0.18);
--accent-b:rgba(34,197,94,0.1);

--line:rgba(255,255,255,0.08);
--line-md:rgba(255,255,255,0.18);

}

html{scroll-behavior:smooth;}

body{

font-family:'Cabinet Grotesk',sans-serif;

background:
radial-gradient(circle at 15% 15%, rgba(34,197,94,0.12), transparent 40%),
radial-gradient(circle at 85% 75%, rgba(59,130,246,0.12), transparent 40%),
var(--bg);

color:var(--text);
font-size:15px;
line-height:1.6;
overflow-x:hidden;

}

/* NAV */

nav{

position:fixed;
top:0;
left:0;
right:0;

height:56px;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 2.5rem;

background:rgba(10,10,15,0.75);
backdrop-filter:blur(18px);

border-bottom:1px solid var(--line);

z-index:200;

}

.nav-center{
display:flex;
gap:1.5rem;
}

.nav-center a{

font-size:0.72rem;
letter-spacing:0.08em;
text-decoration:none;
color:var(--dim);

transition:0.25s;

}

.nav-center a:hover{
color:var(--text);
}

.nav-otw{

display:flex;
align-items:center;
gap:6px;

font-size:0.65rem;
letter-spacing:0.1em;
text-transform:uppercase;

color:var(--accent);

}

.nav-otw-dot{
width:6px;
height:6px;
border-radius:50%;
background:#6ee7b7;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{opacity:1}
50%{opacity:.4}
}

/* HERO */

.hero{

min-height:100vh;
padding-top:56px;

display:grid;
grid-template-columns:1fr 340px;

max-width:1280px;
margin:auto;

border-right:1px solid var(--line);

}

.hero-left{

padding:5rem 3rem;

border-right:1px solid var(--line);

display:flex;
flex-direction:column;
justify-content:space-between;

}

.hero-right{

padding:5rem 2.5rem;

background:var(--bg2);

display:flex;
flex-direction:column;
justify-content:space-between;

}

.hero-name{

font-size:clamp(2.8rem,6vw,5rem);
font-weight:800;

letter-spacing:-0.03em;

text-shadow:0 0 30px rgba(34,197,94,0.25);

}

.line-dim{

display:block;

color:var(--dim2);

font-style:italic;

font-family:'Newsreader',serif;

font-size:0.4em;

margin-top:8px;

}

.hero-tagline{

font-family:'Newsreader',serif;

font-size:1.2rem;

color:var(--dim);

margin:1.5rem 0;

}

.btn{

font-size:0.72rem;
letter-spacing:0.08em;
text-transform:uppercase;

padding:.75rem 1.5rem;

border-radius:4px;

text-decoration:none;

display:inline-block;

transition:.25s;

}

.btn-accent{

background:linear-gradient(135deg,#22c55e,#4ade80);
color:#02140a;

box-shadow:0 6px 20px rgba(34,197,94,0.35);

}

.btn-accent:hover{

transform:translateY(-2px);

box-shadow:0 12px 30px rgba(34,197,94,0.55);

}

.btn-ghost{

border:1px solid var(--line-md);
color:var(--dim);

}

.btn-ghost:hover{
border-color:var(--accent);
color:var(--text);
}

/* MAIN */

.main{

max-width:1280px;
margin:6rem auto;

border-right:1px solid var(--line);

}

/* SECTION BAR */

.sec-bar{

height:52px;

display:flex;
align-items:center;

padding:0 3rem;

border-top:1px solid var(--line);
border-bottom:1px solid var(--line);

}

.sec-bar-title{

font-size:0.65rem;
letter-spacing:0.14em;
text-transform:uppercase;

background:linear-gradient(90deg,#22c55e,#4ade80);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* PROJECTS */

.proj-wrap{
padding:0 3rem;
}

.proj-row{

display:grid;
grid-template-columns:1fr 200px;

gap:2rem;

padding:2.5rem 0;

border-bottom:1px solid var(--line);

background:rgba(255,255,255,0.02);

backdrop-filter:blur(10px);

transition:.3s;

}

.proj-row:hover{

transform:translateY(-4px);

background:rgba(255,255,255,0.04);

}

.proj-name{

font-size:1.7rem;
font-weight:700;

margin-bottom:.4rem;

}

.proj-desc{

font-size:.82rem;
color:var(--dim);
line-height:1.7;

max-width:520px;

margin-bottom:.8rem;

}

.proj-tags{
display:flex;
flex-wrap:wrap;
gap:.35rem;
}

.proj-tag{

font-size:.62rem;

border:1px solid rgba(201,168,130,0.15);

padding:.2rem .6rem;

background:var(--accent-b);

}

/* TWO COL */

.two-col{
display:grid;
grid-template-columns:1fr 1fr;
}

.two-col>div{
padding:3rem;
}

.two-col>div:first-child{
border-right:1px solid var(--line);
}

/* SKILLS */

.pills{
display:flex;
flex-wrap:wrap;
gap:.4rem;
}

.pill{

font-size:.75rem;

border:1px solid var(--line);

padding:.3rem .7rem;

transition:.2s;

}

.pill:hover{

border-color:var(--accent);

background:var(--accent-b);

}

/* EXPERIENCE */

.xp-row{
padding:1.5rem 0;
border-bottom:1px solid var(--line);
}

.xp-role{
font-weight:700;
}

.xp-list{

list-style:none;
margin-top:.5rem;

}

.xp-list li{

padding-left:1rem;
position:relative;

margin-bottom:.3rem;

color:var(--dim);

}

.xp-list li::before{

content:"›";

position:absolute;
left:0;

color:var(--accent);

}

/* CONTACT */

.contact-section{
display:grid;
grid-template-columns:1fr 1fr;
}

.contact-left{

padding:4rem 3rem;

border-right:1px solid var(--line);

}

.contact-right{

padding:4rem 3rem;

background:var(--bg2);

}

.contact-big{

font-size:clamp(2.4rem,5vw,4rem);
font-weight:800;

}

.clink{

display:flex;
justify-content:space-between;

padding:1rem 0;

border-bottom:1px solid var(--line);

text-decoration:none;

color:var(--dim);

}

.clink:hover{
color:var(--text);
}

/* FOOTER */

footer{

max-width:1280px;
margin:auto;

border-top:1px solid var(--line);
border-right:1px solid var(--line);

padding:1.5rem 3rem;

font-size:.65rem;
color:var(--dim2);

}

</style>
</head>

<body>

<nav>

<div class="nav-center">
<a href="#work">Work</a>
<a href="#skills">Skills</a>
<a href="#experience">Experience</a>
<a href="#contact">Contact</a>
</div>

<div class="nav-otw">
<div class="nav-otw-dot"></div>
Open to Work
</div>

</nav>

<div class="hero">

<div class="hero-left">

<div>

<h1 class="hero-name">
Preeti Ambwani
<span class="line-dim">Software Engineer · ML Systems · Data Analyst</span>
</h1>

<p class="hero-tagline">
Building systems that scale,
secured by design.
</p>

<a href="#work" class="btn btn-accent">View Projects</a>
<a href="mailto:ambwanipreeti@gmail.com" class="btn btn-ghost">Get in Touch</a>

</div>

</div>

<div class="hero-right">

<p>
CSE undergraduate at VIT Vellore building scalable backend systems and ML solutions.
</p>

</div>

</div>

<footer>

© 2026 Preeti Ambwani

</footer>

</body>
</html>
